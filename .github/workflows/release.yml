# Builds Kerchunk and publishes a GitHub Release when a version tag is pushed.
#
#   git tag v1.0.0 && git push origin v1.0.0
#
# GitHub-hosted runners have no upload size cap (unlike the Cloudflare-fronted
# Gitea host), so this build includes the Linux AppImage as well as the .deb,
# plus the Windows Setup + Portable installers.
#
# NOTE: Gitea also scans .github/workflows, so every job is guarded to run only
# on github.com — on Gitea these jobs are skipped (the .gitea/workflows one
# handles releases there).

name: Release (GitHub)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.server_url == 'https://github.com' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: ubuntu-latest
            args: --linux AppImage deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package
        env:
          # Unsigned builds — skip signing so nothing contacts a timestamp server.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.args }} --publish never
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore
      # TARA-branded Windows installers (separate product) → release-tara/
      - name: Package TARA (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist:tara
      - uses: actions/upload-artifact@v5
        if: matrix.os == 'windows-latest'
        with:
          name: tara
          path: |
            release-tara/*.exe
          if-no-files-found: ignore

  release:
    if: ${{ github.server_url == 'https://github.com' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
